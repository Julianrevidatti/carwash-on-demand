<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Fondo azul -->
  <rect width="256" height="256" fill="#2d4a7c"/>
  
  <!-- Icono de tienda en blanco -->
  <g fill="white" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Techo/Toldo -->
    <path d="M 60 80 L 80 100 L 176 100 L 196 80 Z" fill="white"/>
    <rect x="80" y="100" width="96" height="12" fill="white"/>
    
    <!-- Ondas del toldo -->
    <path d="M 80 112 Q 95 118 110 112 T 140 112 T 170 112 L 176 112" 
          fill="none" stroke="white" stroke-width="6"/>
    
    <!-- Estructura de la tienda -->
    <rect x="70" y="112" width="116" height="100" rx="0" fill="white"/>
    
    <!-- Puerta -->
    <path d="M 108 160 L 108 212 L 148 212 L 148 160 Q 128 150 108 160 Z" 
          fill="#2d4a7c"/>
    
    <!-- Ventana superior (arco) -->
    <circle cx="128" cy="140" r="12" fill="#2d4a7c"/>
  </g>
</svg>
